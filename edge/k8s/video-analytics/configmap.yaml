apiVersion: v1
kind: ConfigMap
metadata:
  name: video-analytics-config
  namespace: video-analytics
  labels:
    app.kubernetes.io/name: video-analytics
    app.kubernetes.io/part-of: azure-iot-demo
data:
  DETECTION_INTERVAL: "5.0"
  APP_VERSION: "0.3.2"
  # AIO MQTT broker service name within the cluster.
  # O listener padrão (aio-broker) usa TLS+SAT na 18883. Para o demo, usamos o
  # listener for LoadBalancer (demo1883)
  # que expõe a 1883 sem TLS/autenticação. FQDN é necessário pois o broker roda
  # no namespace azure-iot-operations e este app roda em video-analytics.
  MQTT_HOST: "demo1883.azure-iot-operations.svc.cluster.local"
  #MQTT_HOST: "aio-broker.azure-iot-operations.svc.cluster.local"
  #MQTT_HOST: "10.20.0.4"
  MQTT_PORT: "1883"
  MQTT_TOPIC: "video-analytics/detections/edge-device-01"
  DEVICE_ID: "edge-device-01"
  LOG_LEVEL: "INFO"
