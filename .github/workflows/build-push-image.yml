name: Build and Push Video Analytics Image

on:
  push:
    branches:
      - main
    paths:
      - "edge/video-analytics/**"
  pull_request:
    branches:
      - main
    paths:
      - "edge/video-analytics/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (defaults to short SHA)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write # required for OIDC-based ACR login

env:
  ACR_NAME: ${{ vars.ACR_NAME }} # e.g. aiotdemoacr
  IMAGE_NAME: video-analytics

jobs:
  build-push:
    name: Build & push container image
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Determine image tag ────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            SEMVER="${{ github.event.inputs.image_tag }}"
          else
            # Monotonically increasing semver so the Flux ImagePolicy (>=0.1.0,
            # selects the highest) detects every new build. Patch = run number.
            # Minor is 0.2 to stay above the earlier manual 0.1.x builds.
            SEMVER="0.2.${GITHUB_RUN_NUMBER}"
          fi
          echo "semver=$SEMVER"       >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA"  >> "$GITHUB_OUTPUT"

      # ── Login to ACR via OIDC (no stored secrets) ─────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      # ── Build & push ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: edge/video-analytics
          push: ${{ github.ref_name == 'main' }}
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.semver }}
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.semver }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.short_sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── Summarise ──────────────────────────────────────────────────────
      - name: Job summary
        if: github.ref_name == 'main'
        run: |
          echo "### ✅ Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`$ACR_NAME.azurecr.io\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`$IMAGE_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag (semver) | \`${{ steps.tag.outputs.semver }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag (SHA) | \`${{ steps.tag.outputs.short_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Flux Image Automation will detect this new tag and automatically" >> "$GITHUB_STEP_SUMMARY"
          echo "update the deployment on the edge cluster." >> "$GITHUB_STEP_SUMMARY"
