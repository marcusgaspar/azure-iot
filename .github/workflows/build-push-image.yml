name: Build and Push Video Analytics Image

on:
  push:
    branches:
      - main
    paths:
      - "edge/video-analytics/**"
  pull_request:
    branches:
      - main
    paths:
      - "edge/video-analytics/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (defaults to short SHA)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write   # required for OIDC-based ACR login

env:
  ACR_NAME: ${{ vars.ACR_NAME }}            # e.g. aiotdemoacr
  IMAGE_NAME: video-analytics

jobs:
  build-push:
    name: Build & push container image
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Determine image tag ────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            TAG="$(echo $GITHUB_SHA | cut -c1-7)"
          else
            TAG="pr-$(echo $GITHUB_SHA | cut -c1-7)"
          fi
          # Also derive a semver from the latest Git tag (for GitOps policy)
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          SEMVER="${LATEST_TAG:-0.1.0}"
          echo "short_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER"  >> "$GITHUB_OUTPUT"

      # ── Check required configuration ───────────────────────────────────
      - name: Check Azure credentials and ACR configuration
        id: prereqs
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          missing=""
          [[ -z "$ACR_NAME" ]]   && missing="$missing ACR_NAME(var)"
          [[ -z "$CLIENT_ID" ]]  && missing="$missing AZURE_CLIENT_ID(secret)"
          [[ -z "$TENANT_ID" ]]  && missing="$missing AZURE_TENANT_ID(secret)"
          if [[ -n "$missing" ]]; then
            echo "::warning::Missing configuration:$missing -- image will be built but not pushed to ACR."
            echo "push_enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "push_enabled=true" >> "$GITHUB_OUTPUT"
          fi
          # Compute image base reference for Docker tags
          if [[ -n "$ACR_NAME" ]]; then
            echo "image_base=${ACR_NAME}.azurecr.io/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_base=${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Login to ACR via OIDC (no stored secrets) ─────────────────────
      - name: Azure login (OIDC)
        if: steps.prereqs.outputs.push_enabled == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        if: steps.prereqs.outputs.push_enabled == 'true'
        run: az acr login --name "$ACR_NAME"

      # ── Build & push ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: edge/video-analytics
          push: ${{ github.ref_name == 'main' && steps.prereqs.outputs.push_enabled == 'true' }}
          tags: |
            ${{ steps.prereqs.outputs.image_base }}:${{ steps.tag.outputs.short_tag }}
            ${{ steps.prereqs.outputs.image_base }}:${{ steps.tag.outputs.semver }}
            ${{ steps.prereqs.outputs.image_base }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── Summarise ──────────────────────────────────────────────────────
      - name: Job summary
        if: github.ref_name == 'main' && steps.prereqs.outputs.push_enabled == 'true'
        run: |
          echo "### ✅ Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`$ACR_NAME.azurecr.io\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`$IMAGE_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag (SHA) | \`${{ steps.tag.outputs.short_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag (semver) | \`${{ steps.tag.outputs.semver }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Flux Image Automation will detect this new tag and automatically" >> "$GITHUB_STEP_SUMMARY"
          echo "update the deployment on the edge cluster." >> "$GITHUB_STEP_SUMMARY"
