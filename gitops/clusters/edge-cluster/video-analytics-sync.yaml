# Flux Kustomization: tells Flux which path in the repo to reconcile and
# in what order (namespace first, then workloads).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: video-analytics
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: azure-iot-demo
  path: ./edge/k8s
  prune: true # delete resources removed from Git
  timeout: 2m
  # Substitute the ACR login server at deploy time so manifests stay generic
  postBuild:
    substitute:
      ACR_LOGIN_SERVER: "aiotdemoacr.azurecr.io"
