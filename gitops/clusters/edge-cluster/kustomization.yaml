# Kustomize index (NOT a Flux Kustomization). This is the file that
# `flux bootstrap` builds via `kustomize build ./gitops/clusters/edge-cluster`.
# It must use apiVersion kustomize.config.k8s.io/v1beta1 and simply lists the
# Flux custom resources that live in this directory.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gitrepository.yaml
  - video-analytics-sync.yaml
  - image-repository.yaml
  - image-policy.yaml
  - image-update-automation.yaml
