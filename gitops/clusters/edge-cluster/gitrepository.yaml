# Flux GitRepository: points Flux at this repo so it continuously
# reconciles the cluster state against the manifests in edge/k8s/.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: azure-iot-demo
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/marcusgaspar/azure-iot # replace with your fork URL
  ref:
    branch: main
  secretRef:
    name: git-credentials # PAT or SSH key stored as a K8s Secret
